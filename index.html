<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>WRX Tire Tracker</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --subaru:     #004890;   /* Subaru brand blue */
      --wrx:        #053a88;   /* WRX blue */
      --accent:     #4a9eff;   /* bright readable blue for highlights */
      --gold:       #f0c040;   /* warm amber for warnings/status */
      --bg:         #01102a;   /* deep navy */
      --surface:    #02193f;   /* card background */
      --surface2:   #032050;   /* inset / input background */
      --border:     #0a3570;   /* subtle border */
      --text:       #ffffff;   /* primary text */
      --text-dim:   #ffffff;   /* secondary text — white */
      --text-muted: #c8daf0;   /* tertiary / placeholder — very light blue-white */
      --danger:     #ff5555;
      --danger-dim: #ff7070;
      --font: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    }

    html, body {
      background: var(--bg); color: var(--text);
      font-family: var(--font); min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    #app {
      max-width: 480px; margin: 0 auto;
      min-height: 100vh; display: flex; flex-direction: column;
    }

    .stripe {
      height: 5px;
      background: linear-gradient(90deg, var(--wrx) 0%, var(--subaru) 50%, var(--accent) 100%);
      flex-shrink: 0;
    }

    /* ── Header ── */
    header {
      background: var(--wrx); border-bottom: 1px solid var(--subaru);
      padding: 18px 20px 14px; display: flex;
      align-items: center; justify-content: space-between; flex-shrink: 0;
    }
    .header-sub   { font-size: 12px; letter-spacing: 3px; color: rgba(255,255,255,0.8); margin-bottom: 3px; text-transform: uppercase; }
    .header-title { font-size: 26px; font-weight: 700; letter-spacing: 1px; color: #fff; }
    .header-title span { color: var(--accent); }

    #status-badge {
      font-size: 13px; letter-spacing: 1px; font-weight: 700;
      opacity: 0; transition: opacity 0.3s; text-align: right; line-height: 1.5;
    }
    #status-badge.show  { opacity: 1; }
    #status-badge.ok    { color: var(--gold); }
    #status-badge.error { color: var(--danger); }

    /* ── Nav ── */
    nav {
      background: var(--subaru); border-bottom: 2px solid var(--wrx);
      display: flex; flex-shrink: 0;
    }
    nav button {
      flex: 1; background: transparent; color: rgba(255,255,255,0.8); border: none;
      border-bottom: 3px solid transparent; padding: 15px 4px 13px;
      font-size: 13px; letter-spacing: 1px; font-weight: 500;
      cursor: pointer; font-family: var(--font); text-transform: uppercase;
      min-height: 54px; transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    nav button.active {
      background: rgba(255,255,255,0.12); color: #fff;
      border-bottom-color: var(--accent); font-weight: 700;
    }

    .view { display: none; padding: 16px; flex: 1; }
    .view.active { display: block; }

    /* ── Loading overlay ── */
    #loading-overlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 16px; z-index: 100;
    }
    #loading-overlay.hidden { display: none; }
    .spinner {
      width: 40px; height: 40px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text  { font-size: 15px; color: #fff; letter-spacing: 1px; }
    .error-icon    { font-size: 36px; }
    .error-message {
      font-size: 15px; color: var(--danger-dim); text-align: center;
      max-width: 300px; line-height: 1.7; white-space: pre-line;
    }
    .btn-retry {
      background: var(--subaru); color: #fff; border: none;
      padding: 14px 28px; font-size: 15px; font-family: var(--font);
      border-radius: 6px; cursor: pointer; font-weight: 600;
    }

    /* ── Config banner ── */
    #config-banner {
      background: var(--surface2); border: 1px solid var(--gold);
      border-left: 4px solid var(--gold); border-radius: 6px;
      padding: 14px 16px; margin-bottom: 14px;
      font-size: 14px; color: var(--text-dim); line-height: 1.7; display: none;
    }
    #config-banner strong { color: var(--gold); display: block; margin-bottom: 4px; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }

    /* ── Cards ── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 18px; margin-bottom: 14px;
    }
    .card.highlight { border-color: var(--accent); border-left: 5px solid var(--accent); }

    #mounted-banner { display: flex; justify-content: space-between; align-items: center; }
    .mounted-icon { flex-shrink: 0; margin-left: 12px; }
    .tire-wrap {
      position: relative;
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--surface);
    }
    .tire-caliper {
      position: absolute; top: 0; left: 0;
      z-index: 1;
      pointer-events: none;
    }
    .tire-spinner {
      position: absolute; top: 0; left: 0;
      z-index: 2;
      animation: roll 2s linear infinite;
      transform-origin: center;
    }
    @keyframes roll {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes pulse-border {
      0%, 100% { border-color: rgba(255,255,255,0.9); box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
      50%       { border-color: rgba(255,255,255,0.4); box-shadow: 0 0 0 4px rgba(255,255,255,0.0); }
    }
    .label-xs {
      font-size: 12px; letter-spacing: 2px; color: var(--text-dim);
      text-transform: uppercase; margin-bottom: 6px; font-weight: 600;
    }

    /* ── Tire set cards ── */
    .tire-card {
      background: var(--surface); border-radius: 8px; padding: 20px 18px;
      margin-bottom: 14px; position: relative; border: 2px solid #444;
      transition: border-color 0.3s;
    }
    .tire-card.on-car {
      border-color: rgba(255,255,255,0.9);
      animation: pulse-border 2s ease-in-out infinite;
    }
    .tire-card.in-storage { border-color: #444; }
    .on-car-badge {
      position: absolute; top: 14px; right: 14px; font-size: 12px;
      letter-spacing: 1.5px; font-weight: 700; background: var(--subaru);
      color: #fff; padding: 4px 10px; border-radius: 4px;
    }
    .in-storage-badge {
      position: absolute; top: 14px; right: 14px; font-size: 12px;
      letter-spacing: 1.5px; font-weight: 600; background: #2a2a2a;
      color: #888; padding: 4px 10px; border-radius: 4px; border: 1px solid #444;
    }
    .tire-set-label { font-size: 12px; letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; font-weight: 600; }
    .tire-set-name  { font-size: 15px; color: var(--text-dim); margin-bottom: 18px; font-weight: 500; }
    .miles-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 14px; }
    .miles-big { font-size: 42px; font-weight: 700; line-height: 1; letter-spacing: -1px; color: #fff; }
    .miles-sub { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; margin-top: 5px; }
    .pct-big   { font-size: 32px; font-weight: 700; line-height: 1; text-align: right; }
    .pct-sub   { font-size: 12px; color: var(--text-muted); text-transform: uppercase; margin-top: 5px; text-align: right; }
    .progress-track { background: rgba(255,255,255,0.1); height: 6px; border-radius: 3px; margin-bottom: 12px; }
    .progress-bar   { height: 100%; border-radius: 3px; transition: width 0.6s ease; }
    .tire-status    { font-size: 14px; line-height: 1.5; }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%; background: var(--subaru); color: #fff; border: none;
      padding: 18px; font-size: 16px; font-weight: 700; letter-spacing: 1.5px;
      text-transform: uppercase; cursor: pointer; font-family: var(--font);
      border-radius: 8px; min-height: 58px;
    }
    .btn-primary:hover { background: var(--accent); }

    /* ── Form ── */
    .form-section { margin-bottom: 20px; }
    .form-label { font-size: 14px; color: var(--text-dim); margin-bottom: 8px; font-weight: 600; display: block; }
    input[type="date"], input[type="number"], textarea {
      background: var(--surface2); border: 1px solid var(--border);
      color: #fff; padding: 15px 16px; font-size: 18px;
      font-family: var(--font); outline: none; width: 100%;
      border-radius: 6px; -webkit-appearance: none;
    }
    input::placeholder { color: var(--text-muted); }
    input:focus, textarea:focus { border-color: var(--accent); border-width: 2px; }
    textarea { resize: vertical; min-height: 80px; font-size: 16px; }

    /* ── Set picker ── */
    .set-picker { display: flex; gap: 12px; }
    .set-btn {
      flex: 1; padding: 18px 8px; background: var(--surface2); color: var(--text-dim);
      border: 2px solid var(--border); cursor: pointer; font-family: var(--font);
      border-radius: 8px; line-height: 1.5; min-height: 76px; text-align: center;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .set-btn .set-short { font-size: 17px; font-weight: 700; display: block; color: #fff; }
    .set-btn .set-long  { font-size: 12px; opacity: 0.8; margin-top: 4px; display: block; }

    /* ── Form actions ── */
    .form-actions { display: flex; gap: 12px; }
    .btn-save {
      flex: 2; background: var(--subaru); color: #fff; border: none;
      padding: 18px; font-size: 16px; font-weight: 700; letter-spacing: 1px;
      text-transform: uppercase; cursor: pointer; font-family: var(--font);
      border-radius: 8px; min-height: 58px;
    }
    .btn-save:hover  { background: var(--accent); }
    .btn-save:disabled { background: var(--surface2); color: var(--text-muted); cursor: not-allowed; }
    .btn-cancel {
      flex: 1; background: transparent; color: #fff;
      border: 2px solid rgba(255,255,255,0.3); padding: 18px; font-size: 16px;
      cursor: pointer; font-family: var(--font); border-radius: 8px; min-height: 58px;
    }
    .btn-cancel:hover { border-color: #fff; }

    /* ── History ── */
    .swap-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; border-left-width: 5px; padding: 16px; margin-bottom: 12px;
    }
    .swap-top   { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
    .swap-set   { font-size: 16px; font-weight: 700; color: #fff; }
    .swap-meta  { font-size: 14px; color: var(--text-dim); margin-top: 4px; }
    .swap-notes { font-size: 14px; color: var(--text-muted); margin-top: 4px; }
    .swap-miles { text-align: right; margin-left: 12px; flex-shrink: 0; }
    .swap-miles-big { font-size: 24px; font-weight: 700; color: #fff; line-height: 1; }
    .swap-miles-sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
    .swap-actions { margin-top: 12px; display: flex; justify-content: flex-end; gap: 8px; }
    .btn-remove {
      background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.3);
      padding: 9px 16px; font-size: 13px; cursor: pointer; font-family: var(--font);
      border-radius: 6px; letter-spacing: 1px; min-height: 42px;
    }
    .btn-remove:hover { border-color: var(--danger); color: var(--danger); }
    .btn-confirm-del {
      background: #801010; color: #fff; border: none; padding: 11px 20px;
      font-size: 14px; cursor: pointer; font-family: var(--font);
      border-radius: 6px; font-weight: 700; min-height: 46px;
    }
    .btn-cancel-del {
      background: transparent; color: #fff; border: 2px solid rgba(255,255,255,0.3);
      padding: 11px 20px; font-size: 14px; cursor: pointer;
      font-family: var(--font); border-radius: 6px; min-height: 46px;
    }
    .empty-state { color: #fff; font-size: 16px; margin-top: 8px; opacity: 0.7; }
    .spacer { height: 32px; flex-shrink: 0; }
  </style>
</head>
<body>

<div id="loading-overlay">
  <div class="spinner"     id="spinner"></div>
  <div class="loading-text" id="loading-text">Loading from Google Sheets...</div>
  <div class="error-icon"   id="error-icon"    style="display:none">⚠</div>
  <div class="error-message" id="error-message" style="display:none"></div>
  <button class="btn-retry"  id="btn-retry"     style="display:none" onclick="init()">Retry</button>
</div>

<div id="app">
  <div class="stripe"></div>

  <header>
    <div>
      <div class="header-sub">2015 WRX · FA20</div>
      <div class="header-title">Tire <span>Tracker</span></div>
    </div>
    <div id="status-badge"></div>
  </header>

  <nav>
    <button class="active" onclick="showView('dashboard')" id="tab-dashboard">Dashboard</button>
    <button onclick="showView('log')"     id="tab-log">Log Swap</button>
    <button onclick="showView('history')" id="tab-history">History</button>
  </nav>

  <!-- DASHBOARD -->
  <div class="view active" id="view-dashboard">
    <div id="config-banner">
      <strong>Setup Required</strong>
      Open <code>index.html</code> in a text editor and fill in
      <code>SHEET_CSV_URL</code> and <code>SCRIPT_URL</code> at the top of the
      &lt;script&gt; section. See SETUP.md for step-by-step instructions.
    </div>

    <div class="card highlight" id="mounted-banner">
      <div>
        <div class="label-xs">Currently Mounted</div>
        <div id="mounted-name" style="font-size:19px;font-weight:700;margin-bottom:5px;"></div>
        <div id="mounted-meta" style="font-size:14px;color:var(--text-dim);"></div>
      </div>
      <div class="mounted-icon">
        <div class="tire-wrap">
          <!-- Static layer: caliper BEHIND the rim — drawn first so rim renders on top -->
          <svg class="tire-caliper" viewBox="0 0 80 80" width="80" height="80" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <!-- Clip to the annular rim window: inside rim (r=26) but outside hub (r=16) -->
              <clipPath id="rim-window">
                <circle cx="40" cy="40" r="26"/>
              </clipPath>
            </defs>
            <g clip-path="url(#rim-window)">
              <!-- Caliper body: right side arc -->
              <path d="M 63 28 Q 70 40 63 52" fill="none" stroke="#CBE800" stroke-width="5" stroke-linecap="round"/>
              <path d="M 60 30 Q 66 40 60 50" fill="none" stroke="#CBE800" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
              <!-- Caliper bracket top -->
              <line x1="63" y1="28" x2="56" y2="26" stroke="#CBE800" stroke-width="4" stroke-linecap="round"/>
              <!-- Caliper bracket bottom -->
              <line x1="63" y1="52" x2="56" y2="54" stroke="#CBE800" stroke-width="4" stroke-linecap="round"/>
              <!-- Bleed screw dot -->
              <circle cx="67" cy="40" r="2.5" fill="#CBE800"/>
            </g>
          </svg>
          <!-- Rotating layer: tire + rim + spokes — drawn ON TOP of caliper -->
          <svg class="tire-spinner" viewBox="0 0 80 80" width="80" height="80" xmlns="http://www.w3.org/2000/svg">
            <!-- Black outer tire sidewall -->
            <circle cx="40" cy="40" r="38" fill="#111111"/>
            <!-- Tire inner edge — transparent gap between sidewall and rim -->
            <circle cx="40" cy="40" r="27" fill="transparent"/>
            <!-- Dark gray rim -->
            <circle cx="40" cy="40" r="26" fill="#3a3a3a"/>
            <!-- Rim inner cutout / window — transparent so caliper behind shows through -->
            <circle cx="40" cy="40" r="16" fill="transparent"/>
            <!-- Hub -->
            <circle cx="40" cy="40" r="6" fill="#555555"/>
            <!-- Lug nut dots -->
            <circle cx="40" cy="26" r="2" fill="#222"/>
            <circle cx="40" cy="54" r="2" fill="#222"/>
            <circle cx="26" cy="40" r="2" fill="#222"/>
            <circle cx="54" cy="40" r="2" fill="#222"/>
            <!-- Spokes -->
            <line x1="40" y1="34" x2="40" y2="22" stroke="#555" stroke-width="3" stroke-linecap="round"/>
            <line x1="40" y1="46" x2="40" y2="58" stroke="#555" stroke-width="3" stroke-linecap="round"/>
            <line x1="34" y1="40" x2="22" y2="40" stroke="#555" stroke-width="3" stroke-linecap="round"/>
            <line x1="46" y1="40" x2="58" y2="40" stroke="#555" stroke-width="3" stroke-linecap="round"/>
            <line x1="35.8" y1="35.8" x2="27.5" y2="27.5" stroke="#555" stroke-width="3" stroke-linecap="round"/>
            <line x1="44.2" y1="44.2" x2="52.5" y2="52.5" stroke="#555" stroke-width="3" stroke-linecap="round"/>
            <line x1="44.2" y1="35.8" x2="52.5" y2="27.5" stroke="#555" stroke-width="3" stroke-linecap="round"/>
            <line x1="35.8" y1="44.2" x2="27.5" y2="52.5" stroke="#555" stroke-width="3" stroke-linecap="round"/>
            <!-- Rim outer highlight ring -->
            <circle cx="40" cy="40" r="26" fill="none" stroke="#555" stroke-width="1"/>
          </svg>
        </div>
      </div>
    </div>

    <div id="tire-cards"></div>

    <button class="btn-primary" onclick="showView('log')">+ Log Tire Swap</button>
  </div>

  <!-- LOG SWAP -->
  <div class="view" id="view-log">
    <div class="label-xs" style="margin-bottom:24px;">Log a Swap</div>
    <div class="form-section">
      <label class="form-label" for="swap-date">Date</label>
      <input type="date" id="swap-date" />
    </div>
    <div class="form-section">
      <label class="form-label" for="swap-odo">Odometer (mi)</label>
      <input type="number" inputmode="numeric" id="swap-odo" placeholder="e.g. 75200" />
    </div>
    <div class="form-section">
      <div class="form-label">Mounting</div>
      <div class="set-picker" id="set-picker"></div>
    </div>
    <div class="form-section">
      <label class="form-label" for="swap-notes">Notes (optional)</label>
      <textarea id="swap-notes" placeholder="e.g. Pre-season swap, rotation done"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-save" id="btn-save-swap" onclick="saveSwap()" disabled>Save Swap</button>
      <button class="btn-cancel" onclick="showView('dashboard')">Cancel</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div class="view" id="view-history">
    <div class="label-xs" style="margin-bottom:16px;">Swap History</div>
    <div id="history-list"></div>
  </div>

  <div class="spacer"></div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIGURATION  ← paste your two URLs here after setup
// ═══════════════════════════════════════════════════════════

// Step 1 — Google Sheet published-to-web CSV URL
// In your sheet: File → Share → Publish to web
// Select the "Swap Log" sheet, CSV format, click Publish, copy the URL
const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTulALYBWVgMXENHn28x0XQsf7mx5EXjzb6ZwPLWsi3iRF0cTS5Gmzyqip7DfdUdPFFp5ZnRtbhMWJz/pub?gid=0&single=true&output=csv";

// Step 2 — Apps Script web app deployment URL
// After deploying Code.gs (see SETUP.md), paste the /exec URL here
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwfdUAeagPLTO658dnjf0R5u6WVe1zIo9-4YiqSD3SUyoH1kamPSt3LRujlbq0ykKV5/exec";

// ═══════════════════════════════════════════════════════════
//  TIRE SET DEFINITIONS
// ═══════════════════════════════════════════════════════════
const TIRE_SETS = [
  { id: "Summer", name: "Michelin Pilot Sport 4S",        shortName: "Summer", treadLife: 30000, color: "#e03030" },
  { id: "Winter", name: "Continental ExtremeContact DWS", shortName: "Winter", treadLife: 50000, color: "#2dbe8a" },
];

// ═══════════════════════════════════════════════════════════
//  DATA
// ═══════════════════════════════════════════════════════════
let appData = { swaps: [], currentSet: null };

// Parse CSV from the sheet.
// Columns: A=#, B=Date, C=Tire Set, D=Odometer, E=Notes
function parseCSV(csv) {
  const lines = csv.trim().split("\n");
  const rows  = lines.map(l => {
    const cols = []; let cur = ""; let inQ = false;
    for (const ch of l) {
      if (ch === '"') { inQ = !inQ; }
      else if (ch === "," && !inQ) { cols.push(cur.trim()); cur = ""; }
      else cur += ch;
    }
    cols.push(cur.trim());
    return cols;
  });

  // Skip header row — data rows have a numeric odometer in column D (index 3)
  const dataRows = rows.filter(c => c[3] && /^\d[\d,]*$/.test(c[3].replace(/,/g, "")));

  const swaps = dataRows.map((c, i) => ({
    id:       i + 1,
    date:     c[1] || "",
    setId:    c[2] || "",
    odometer: parseInt(c[3].replace(/,/g, "")) || 0,
    notes:    c[4] || "",
  })).filter(s => s.odometer > 0 && s.setId);

  const sorted     = [...swaps].sort((a, b) => b.odometer - a.odometer);
  const currentSet = sorted.length > 0 ? sorted[0].setId : null;
  return { swaps, currentSet };
}

// ─── Fetch ────────────────────────────────────────────────
async function fetchSheetData() {
  if (!SHEET_CSV_URL) {
    document.getElementById("config-banner").style.display = "block";
    return;
  }
  const url = SHEET_CSV_URL + "&t=" + Date.now();
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Sheet fetch failed (HTTP ${res.status})`);
  appData = parseCSV(await res.text());
}

// ─── Write via Apps Script (GET to avoid CORS) ───────────
// Apps Script GET requests are CORS-safe from any origin.
// We pass the payload as URL query parameters.
async function postToScript(payload) {
  if (!SCRIPT_URL) throw new Error("SCRIPT_URL not configured — see SETUP.md");
  const params = new URLSearchParams(payload);
  const res    = await fetch(`${SCRIPT_URL}?${params.toString()}`);
  if (!res.ok) throw new Error(`Script request failed (HTTP ${res.status})`);
  const json = await res.json();
  if (json.status !== "ok") throw new Error(json.message || "Script returned an error");
  return json;
}

// ═══════════════════════════════════════════════════════════
//  MILEAGE CALC
// ═══════════════════════════════════════════════════════════
// Base mileage carried over from previous tracking (pre-sheet history)
const BASE_MILES = { Summer: 13345, Winter: 34675 };

function getMileage(swaps, currentOdo) {
  const totals = {};
  TIRE_SETS.forEach(t => (totals[t.id] = BASE_MILES[t.id] || 0));
  const sorted = [...swaps].sort((a, b) => a.odometer - b.odometer);
  sorted.forEach((swap, i) => {
    const next   = sorted[i + 1];
    const endOdo = next ? next.odometer : swap.odometer;
    if (swap.setId && totals[swap.setId] !== undefined)
      totals[swap.setId] += Math.max(0, endOdo - swap.odometer);
  });
  return totals;
}

// ═══════════════════════════════════════════════════════════
//  UI HELPERS
// ═══════════════════════════════════════════════════════════
function showStatus(msg, type = "ok", duration = 2500) {
  const el = document.getElementById("status-badge");
  el.textContent = msg;
  el.className   = `show ${type}`;
  if (duration) setTimeout(() => (el.className = type), duration);
}

function showLoading(msg = "Loading from Google Sheets...") {
  document.getElementById("loading-overlay").classList.remove("hidden");
  document.getElementById("spinner").style.display       = "block";
  document.getElementById("loading-text").style.display  = "block";
  document.getElementById("loading-text").textContent    = msg;
  document.getElementById("error-icon").style.display    = "none";
  document.getElementById("error-message").style.display = "none";
  document.getElementById("btn-retry").style.display     = "none";
}

function hideLoading() {
  document.getElementById("loading-overlay").classList.add("hidden");
}

function showLoadError(msg) {
  document.getElementById("spinner").style.display       = "none";
  document.getElementById("loading-text").style.display  = "none";
  document.getElementById("error-icon").style.display    = "block";
  document.getElementById("error-message").style.display = "block";
  document.getElementById("error-message").textContent   = msg;
  document.getElementById("btn-retry").style.display     = "block";
}

// ═══════════════════════════════════════════════════════════
//  NAV
// ═══════════════════════════════════════════════════════════
function showView(name) {
  document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
  document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
  document.getElementById(`view-${name}`).classList.add("active");
  document.getElementById(`tab-${name}`).classList.add("active");
  if (name === "dashboard") renderDashboard();
  if (name === "log")       initLogForm();
  if (name === "history")   renderHistory();
}

// ═══════════════════════════════════════════════════════════
//  DASHBOARD
// ═══════════════════════════════════════════════════════════
function renderDashboard() {
  const mileage = getMileage(appData.swaps, 0);
  const sorted  = [...appData.swaps].sort((a, b) => b.odometer - a.odometer);
  const cur     = TIRE_SETS.find(t => t.id === appData.currentSet);

  if (cur) {
    const latest = sorted[0];
    document.getElementById("mounted-name").textContent = cur.name;
    document.getElementById("mounted-name").style.color = cur.color;
    document.getElementById("mounted-meta").textContent =
      latest ? `Since ${latest.date} · ${latest.odometer.toLocaleString()} mi` : "";
  } else {
    document.getElementById("mounted-name").textContent = "No swaps logged yet";
    document.getElementById("mounted-name").style.color = "var(--text-muted)";
    document.getElementById("mounted-meta").textContent = "Log your first swap to get started";
  }

  const container = document.getElementById("tire-cards");
  container.innerHTML = "";
  TIRE_SETS.forEach(ts => {
    const miles     = mileage[ts.id] || 0;
    const pct       = Math.min(miles / ts.treadLife * 100, 100);
    const isCurrent = appData.currentSet === ts.id;
    const remaining = ts.treadLife - miles;

    // Traffic light thresholds
    const statusColor = pct < 50 ? "#2dbe6a"   // green
                      : pct < 75 ? "#f0c040"   // yellow
                      :            "#ff5555";   // red

    container.innerHTML += `
      <div class="tire-card ${isCurrent ? "on-car" : "in-storage"}">
        ${isCurrent
          ? `<div class="on-car-badge">ON CAR</div>`
          : `<div class="in-storage-badge">IN STORAGE</div>`}
        <div class="tire-set-label">${ts.shortName} Set</div>
        <div class="tire-set-name">${ts.name}</div>
        <div class="miles-row">
          <div>
            <div class="miles-big">${miles.toLocaleString()}</div>
            <div class="miles-sub">miles accumulated</div>
          </div>
          <div>
            <div class="pct-big" style="color:${statusColor}">${Math.round(pct)}%</div>
            <div class="pct-sub">used</div>
          </div>
        </div>
        <div class="progress-track">
          <div class="progress-bar" style="width:${pct}%;background:${statusColor};"></div>
        </div>
        <div class="tire-status" style="color:${statusColor}">
          ${pct >= 75
            ? `⚠ ${remaining.toLocaleString()} mi remaining — inspect tread soon`
            : `${remaining.toLocaleString()} mi remaining of ${ts.treadLife.toLocaleString()} mi limit`}
        </div>
      </div>`;
  });
}

// ═══════════════════════════════════════════════════════════
//  LOG SWAP
// ═══════════════════════════════════════════════════════════
let selectedSetId = null;

function initLogForm() {
  document.getElementById("swap-date").value  = new Date().toISOString().split("T")[0];
  document.getElementById("swap-odo").value   = "";
  document.getElementById("swap-notes").value = "";
  selectedSetId = null;

  const picker = document.getElementById("set-picker");
  picker.innerHTML = "";
  TIRE_SETS.forEach(ts => {
    const btn     = document.createElement("button");
    btn.className = "set-btn";
    btn.id        = `set-btn-${ts.id}`;
    btn.innerHTML = `<span class="set-short">${ts.shortName}</span><span class="set-long">${ts.name}</span>`;
    btn.onclick   = () => selectSet(ts.id, ts.color);
    picker.appendChild(btn);
  });
  updateSaveBtn();
}

function selectSet(id, color) {
  selectedSetId = id;
  TIRE_SETS.forEach(ts => {
    const btn = document.getElementById(`set-btn-${ts.id}`);
    if (ts.id === id) {
      btn.style.background  = color;
      btn.style.borderColor = color;
      btn.style.color       = id === "Summer" ? "#fff" : "#001830";
      btn.style.fontWeight  = "700";
    } else {
      btn.style.background  = "var(--surface2)";
      btn.style.borderColor = "var(--border)";
      btn.style.color       = "#5a8ab0";
      btn.style.fontWeight  = "400";
    }
  });
  updateSaveBtn();
}

function updateSaveBtn() {
  const odo = document.getElementById("swap-odo")?.value;
  const btn = document.getElementById("btn-save-swap");
  if (btn) btn.disabled = !(odo && selectedSetId);
}
document.addEventListener("input", e => { if (e.target.id === "swap-odo") updateSaveBtn(); });

async function saveSwap() {
  const odo   = parseInt(document.getElementById("swap-odo").value);
  const date  = document.getElementById("swap-date").value;
  const notes = document.getElementById("swap-notes").value.trim();
  if (!odo || !selectedSetId) return;

  const btn = document.getElementById("btn-save-swap");
  btn.disabled    = true;
  btn.textContent = "Saving...";
  showStatus("Saving to sheet...", "ok", 0);

  try {
    await postToScript({ action: "addSwap", date, odometer: odo, tireSet: selectedSetId, notes });
    await fetchSheetData();
    showStatus("SAVED ✓", "ok");
    showView("dashboard");
  } catch (err) {
    showStatus("Save failed", "error");
    btn.disabled    = false;
    btn.textContent = "Save Swap";
    console.error(err);
  }
}

// ═══════════════════════════════════════════════════════════
//  HISTORY
// ═══════════════════════════════════════════════════════════
let pendingDelete = null;

function renderHistory() {
  const sorted = [...appData.swaps].sort((a, b) => b.odometer - a.odometer);
  const chron  = [...appData.swaps].sort((a, b) => a.odometer - b.odometer);
  const list   = document.getElementById("history-list");

  if (sorted.length === 0) {
    list.innerHTML = `<div class="empty-state">No swaps logged yet.</div>`;
    return;
  }

  list.innerHTML = sorted.map(swap => {
    const ts     = TIRE_SETS.find(t => t.id === swap.setId);
    const ci     = chron.findIndex(s => s.id === swap.id);
    const next   = chron[ci + 1];
    const endOdo = next ? next.odometer : swap.odometer;
    const miles  = Math.max(0, endOdo - swap.odometer);
    const isOld  = swap.id === chron[0]?.id;
    const isDel  = pendingDelete === swap.id;
    return `
      <div class="swap-item" style="border-left-color:${ts?.color || "var(--border)"}">
        <div class="swap-top">
          <div style="flex:1">
            <div class="swap-set" style="color:${ts?.color || "var(--text)"}">${ts?.shortName} — ${ts?.name}</div>
            <div class="swap-meta">${swap.date} · ${swap.odometer.toLocaleString()} mi${isOld ? " · earliest record" : ""}</div>
            ${swap.notes ? `<div class="swap-notes">${swap.notes}</div>` : ""}
          </div>
          <div class="swap-miles">
            <div class="swap-miles-big">${miles > 0 ? "+" + miles.toLocaleString() : "—"}</div>
            <div class="swap-miles-sub">${next ? "mi this stretch" : "mi so far"}</div>
          </div>
        </div>
        <div class="swap-actions">
          ${isDel
            ? `<button class="btn-confirm-del" onclick="confirmDelete(${swap.id})">Delete</button>
               <button class="btn-cancel-del"  onclick="cancelDelete()">Cancel</button>`
            : `<button class="btn-remove" onclick="requestDelete(${swap.id})">Remove</button>`}
        </div>
      </div>`;
  }).join("");
}

function requestDelete(id) { pendingDelete = id; renderHistory(); }
function cancelDelete()     { pendingDelete = null; renderHistory(); }

async function confirmDelete(id) {
  const swap = appData.swaps.find(s => s.id === id);
  if (!swap) return;
  showStatus("Deleting...", "ok", 0);
  try {
    await postToScript({ action: "deleteSwap", date: swap.date, odometer: swap.odometer, tireSet: swap.setId });
    await fetchSheetData();
    showStatus("Deleted ✓", "ok");
    pendingDelete = null;
    renderHistory();
  } catch (err) {
    showStatus("Delete failed", "error");
    console.error(err);
  }
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
async function init() {
  showLoading();
  try {
    await fetchSheetData();
    hideLoading();
    renderDashboard();
  } catch (err) {
    showLoadError(
      !SHEET_CSV_URL
        ? "SHEET_CSV_URL is not set.\nSee SETUP.md to finish configuration."
        : `Could not load sheet data.\n\n${err.message}\n\nCheck that the sheet is published to the web.`
    );
  }
}

init();
</script>
