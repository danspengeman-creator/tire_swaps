<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Outer black tire sidewall -->
  <circle cx="32" cy="32" r="31" fill="#111"/>
  <!-- Tread texture -->
  <circle cx="32" cy="32" r="31" fill="none" stroke="#222" stroke-width="4" stroke-dasharray="6 4"/>
  <!-- Gap ring -->
  <circle cx="32" cy="32" r="22" fill="#02193f"/>
  <!-- Rim face -->
  <circle cx="32" cy="32" r="21" fill="#3a3a3a"/>
  <!-- Rim inner window -->
  <circle cx="32" cy="32" r="13" fill="#02193f"/>
  <!-- Caliper — painted BEFORE spokes so spokes render on top -->
  <path d="M 42 27 Q 47 32 42 37" fill="none" stroke="#CBE800" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="42" y1="27" x2="37" y2="25.5" stroke="#CBE800" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="42" y1="37" x2="37" y2="38.5" stroke="#CBE800" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="45" cy="32" r="1.8" fill="#CBE800"/>
  <!-- Spokes — painted AFTER caliper so they sit on top -->
  <line x1="32" y1="27" x2="32" y2="15" stroke="#606060" stroke-width="3" stroke-linecap="round"/>
  <line x1="32" y1="37" x2="32" y2="49" stroke="#606060" stroke-width="3" stroke-linecap="round"/>
  <line x1="27" y1="32" x2="15" y2="32" stroke="#606060" stroke-width="3" stroke-linecap="round"/>
  <line x1="37" y1="32" x2="49" y2="32" stroke="#606060" stroke-width="3" stroke-linecap="round"/>
  <line x1="28.8" y1="28.8" x2="20.5" y2="20.5" stroke="#606060" stroke-width="3" stroke-linecap="round"/>
  <line x1="35.2" y1="35.2" x2="43.5" y2="43.5" stroke="#606060" stroke-width="3" stroke-linecap="round"/>
  <line x1="35.2" y1="28.8" x2="43.5" y2="20.5" stroke="#606060" stroke-width="3" stroke-linecap="round"/>
  <line x1="28.8" y1="35.2" x2="20.5" y2="43.5" stroke="#606060" stroke-width="3" stroke-linecap="round"/>
  <!-- Hub on top of spokes -->
  <circle cx="32" cy="32" r="4.5" fill="#555"/>
  <circle cx="32" cy="32" r="2" fill="#333"/>
  <!-- Rim edge highlight -->
  <circle cx="32" cy="32" r="21" fill="none" stroke="#505050" stroke-width="1"/>
</svg>
</svg>
